name: odoo_production
description: "Shop-floor Flutter app for tcs_mms_management_product — Manufacturing Order execution on tablet (Android) + desktop (Windows)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management, DI, routing, i18n
  get: ^4.7.3
  get_storage: ^2.1.1

  # Networking — Odoo JSON-RPC
  dio: ^5.9.2

  # Local persistence
  flutter_secure_storage: ^10.0.0

  # Scanner — camera (Android) for barcode/QR. USB HID on Windows is handled by raw keyboard listener (no package needed).
  mobile_scanner: ^5.2.3

  # Document upload — file picker (both platforms) + camera (Android only).
  file_picker: ^8.1.3
  image_picker: ^1.1.2
  url_launcher: ^6.3.1

  # UI / UX
  intl: ^0.20.2
  awesome_dialog: ^3.3.0
  another_flushbar: ^1.12.32

  # Diagnostics
  connectivity_plus: ^7.1.1
  logger: ^2.7.0

  # Auto-update (Windows: download new Inno Setup installer + silent re-install)
  package_info_plus: ^8.0.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
